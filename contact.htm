        <h1>Jalen Mays</h1>
        <h2>Contact</h2>
        <p>This page is for contacting me</p>

        <!-- CONTACT FORM -->
        <form action="response.htm" method="GET">

            <label>Email:</label><br>
            <input type="email" name="email" required><br><br>

            <label>Password:</label><br>
            <input type="password" name="password" required><br><br>

            <label>Full Name:</label><br>
            <input type="text" name="fullname" required><br><br>

            <label>Address:</label><br>
            <input type="text" name="address" required><br><br>

            <label>City:</label><br>
            <input type="text" name="city" required><br><br>

            <label>State:</label><br>
            <select name="state" required>
                <option value="">Select State</option>
                <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
                <option value="HI">Hawaii</option>
                <option value="IA">Iowa</option>
                <option value="ID">Idaho</option>
                <option value="IL">Illinois</option>
            </select><br><br>

            <label>ZIP:</label><br>
            <input type="text" name="zip" pattern="[0-9]{5}" required><br><br>

            <label>Phone Number:</label><br>
            <input type="tel" name="phone" pattern="[0-9]{10}" required><br><br>

            <label>Creation Date:</label><br>
            <input type="date" name="date" required><br><br>

            <label>Message (50–200 characters):</label><br>
            <textarea name="message" minlength="50" maxlength="200" required></textarea><br><br>

            <label>Type of Inquiry:</label><br>
            <input type="radio" name="inquiry" value="Question" required> Question<br>
            <input type="radio" name="inquiry" value="Support"> Support<br>
            <input type="radio" name="inquiry" value="Business"> Business<br><br>

            <input type="submit" value="Send">
            <input type="reset" value="Reset">

        </form>

    </body>
